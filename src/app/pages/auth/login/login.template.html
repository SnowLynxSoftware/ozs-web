<div class="login-container m-auto shadow p-3 mb-5 bg-body rounded">
  <div class="container">
    <div class="row">
      <div class="col text-center">
        <h3 class="d-inline">Log In</h3>
      </div>
    </div>
    <div class="row">
      <div class="col">
        <div class="mb-3">
          <label for="txtEmail" class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            id="txtEmail"
            placeholder="name@example.com"
          />
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col">
        <div class="mb-3">
          <label for="txtPassword" class="form-label">Password</label>
          <input type="password" class="form-control" id="txtPassword" />
        </div>
      </div>
    </div>
    <div class="d-grid gap-2">
      <button type="button" class="btn btn-outline-primary">Log In</button>
      <button type="button" class="btn btn-link">
        Register A New Account! It's FREE!
      </button>
      <button type="button" class="btn btn-link">Forgot Your Password?</button>
    </div>
  </div>
</div>
